<!DOCTYPE html>
<html>

<head>
  <title>Peta GIS</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <!-- Leaflet Geocoder CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="/css/user.css">
  <link rel="stylesheet" href="/css/map-shared.css">
</head>

<body>
  <div class="d-flex justify-content-between align-items-center px-3 py-2 bg-light border-bottom">
    <div><strong>Peta GIS</strong></div>
    <div class="d-flex align-items-center">
      <span id="user-info" class="me-3 text-primary small fw-bold"></span>
      <button class="btn btn-sm btn-outline-danger" onclick="logout()">Logout</button>
    </div>
  </div>


  <div id="map">
    <button id="legendToggleBtn">▶️</button>
  </div>
  
  <!-- Legend Diameter Pipa -->
  <div id="legend" class="legend">
    <h4>Diameter Pipa</h4>
    <!-- item legend akan diisi via JS -->
  </div>

  <script>
    const legend = document.getElementById('legend');
    const toggleBtn = document.getElementById('legendToggleBtn');

    toggleBtn.addEventListener('click', () => {
      const isHidden = window.getComputedStyle(legend).display === 'none';
      legend.style.display = isHidden ? 'block' : 'none';
      toggleBtn.innerText = isHidden ? '◀️' : '▶️';
    });
  </script>
  <script>
    // Ambil nama user dari sesi
    async function fetchUserInfo() {
      try {
        const res = await fetch('/api/session');
        if (!res.ok) throw new Error('Gagal ambil info user');

        const data = await res.json();
        document.getElementById('user-info').textContent = `👤 ${data.user?.username || ''}`;
      } catch (err) {
        document.getElementById('user-info').textContent = '👤 Guest';
      }
    }

    // Logout
    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      location.href = '/login.html';
    }

    // Jalankan saat halaman dimuat
    fetchUserInfo();
  </script>


  <!-- Libraries -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
  <script src="https://unpkg.com/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>
  <script src="https://ivansanchez.gitlab.io/Leaflet.Path.DashFlow/src/Path.DashFlow.js"></script>

  <!-- Leaflet MarkerCluster CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <!-- Utilitas & logika peta -->
  <script src="js/utils.js"></script>
  <script src="js/map-core-shared.js"></script>
  <script src="js/map-read-shared.js"></script>
  <script src="js/user.js"></script>

</body>

</html>
