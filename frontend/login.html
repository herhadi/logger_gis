<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="/css/login.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

</head>

<body>
  <div id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <div class="login-box">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="mb-0">Login</h4>
      <button id="darkModeBtn" class="btn btn-sm btn-secondary" type="button" onclick="toggleDarkMode()">
        <i class="bi bi-moon"></i>
      </button>
    </div>

    <form id="loginForm">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" required autofocus autocomplete="username">
      </div>
      <div class="mb-3">
        <label for="password" class="form-label d-flex justify-content-between">
          <span>Password</span>
          <span class="toggle-password text-primary" onclick="togglePassword()">Show</span>
        </label>
        <input type="password" class="form-control" id="password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>

    <div id="loginMessage" class="text-danger mt-3 text-center" style="display:none;"></div>
  </div>

  <script>
    const loadingOverlay = document.getElementById('loadingOverlay');
    const form = document.getElementById('loginForm');
    const messageDiv = document.getElementById('loginMessage');
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.querySelector('.toggle-password');
    const darkModeBtn = document.getElementById('darkModeBtn');
    const darkModeIcon = darkModeBtn.querySelector('i');

    // === Dark mode ===
    function updateDarkModeIcon() {
      if (document.body.classList.contains('dark-mode')) {
        darkModeIcon.className = 'bi bi-brightness-high'; // icon matahari
      } else {
        darkModeIcon.className = 'bi bi-moon'; // icon bulan
      }
    }

    function applySavedTheme() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.body.classList.add('dark-mode');
      } else if (savedTheme === 'light') {
        document.body.classList.remove('dark-mode');
      } else {
        // jika belum ada di localStorage, gunakan preferensi sistem
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.body.classList.add('dark-mode');
        }
      }
      updateDarkModeIcon();
    }

    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      updateDarkModeIcon();
    }

    // === Background ===
    function loadBackgroundImage() {
      const width = 1200;
      const height = 800;
      const seed = Date.now();
      const bgUrl = `https://picsum.photos/seed/${seed}/${width}/${height}`;

      const img = new Image();
      img.onload = function () {
        document.body.style.backgroundImage = `url(${bgUrl})`;
        loadingOverlay.style.display = 'none';
        const cleanUrl = bgUrl.replace(/\/\d+\/\d+$/, '');
        const info = document.createElement('div');
        info.className = 'bg-info-text';
        info.textContent = `Image URL: ${cleanUrl}`;
        document.body.appendChild(info);
      };
      img.onerror = function () {
        loadingOverlay.style.display = 'none';
        console.error('Failed to load background image');
      };
      img.src = bgUrl;
    }

    // === Password toggle ===
    function togglePassword() {
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleBtn.textContent = 'Hide';
      } else {
        passwordInput.type = 'password';
        toggleBtn.textContent = 'Show';
      }
    }

    // === Load event ===
    window.addEventListener('load', () => {
      applySavedTheme();
      loadBackgroundImage();
    });

    // === Login form ===
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      messageDiv.style.display = 'none';
      const username = document.getElementById('username').value;
      const password = passwordInput.value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const result = await res.json();
        if (res.ok) {
          window.location.href = result.redirect;
        } else {
          messageDiv.textContent = result.error || 'Login failed';
          messageDiv.style.display = 'block';
        }
      } catch (error) {
        messageDiv.textContent = 'Network error occurred';
        messageDiv.style.display = 'block';
      }
    });
  </script>


</body>

</html>
