<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>403 Akses Ditolak</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      height: 100vh;
      background: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .error-box {
      text-align: center;
      padding: 2rem;
      border-radius: 10px;
      background-color: white;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .error-box h1 {
      font-size: 5rem;
      color: #dc3545;
    }

    .error-box p {
      font-size: 1.2rem;
      color: #6c757d;
    }

    .btn-home {
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="error-box">
    <h1>403</h1>
    <p>Akses ditolak. Anda tidak memiliki izin untuk melihat halaman ini.</p>
    <button class="btn btn-primary btn-home" onclick="history.back()">Kembali ke Halaman Sebelumnya</button>
  </div>
  <script>
    function goBack() {
      if (document.referrer) {
        history.back();
      } else {
        window.location.href = '/login.html';
      }
    }
  </script>
</body>
</html>
